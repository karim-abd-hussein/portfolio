name: Deploy to InfinityFree via FTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Prepare files for deployment
      run: |
        echo "🚀 Starting deployment preparation..."
        echo "Project type: Static HTML/CSS/JS portfolio"
        echo "No build steps required for static files"
        
    - name: Deploy to InfinityFree via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
        exclude: |
          **/.git/**
          **/.gitignore
          **/node_modules/**
          **/README.md
          **/.github/**
          **/*.log
          **/tmp/**
          **/temp/**
          package*.json
          **/setup_github.bat
          
    - name: Notify deployment success
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "Files deployed to: ${{ secrets.FTP_SERVER }}"
        if [ "${{ secrets.WEBHOOK_URL }}" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Portfolio deployed successfully to InfinityFree!"}' \
            "${{ secrets.WEBHOOK_URL }}"
        fi
