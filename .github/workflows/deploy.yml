name: Deploy to InfinityFree via FTP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies (if any)
      run: |
        if [ -f package.json ]; then
          npm ci
        else
          echo "No package.json found, skipping npm install"
        fi
        
    - name: Build/Optimize files
      run: |
        echo "Preparing files for deployment..."
        # Minify CSS if needed
        # Minify JS if needed
        # Any other build steps
        
    - name: Deploy to InfinityFree via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
        exclude: |
          **/.git/**
          **/.gitignore
          **/node_modules/**
          **/README.md
          **/.github/**
          **/*.log
          **/tmp/**
          **/temp/**
          package*.json
          **/setup_github.bat
          
    - name: Notify deployment success
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "Files deployed to: ${{ secrets.FTP_SERVER }}"
        if [ "${{ secrets.WEBHOOK_URL }}" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Portfolio deployed successfully to InfinityFree!"}' \
            "${{ secrets.WEBHOOK_URL }}"
        fi
